version: '3'

services:
  # Jaeger Collector
  collector:
    image: jaegertracing/jaeger-collector:1.18.0
    restart: always
    environment:
      - "SPAN_STORAGE_TYPE=elasticsearch"
      - "ES_SERVER_URLS=http://elasticsearch:9200"
    ports:
      - 14268:14268
    depends_on:
      - elasticsearch

  # Jaeger UI
  query:
    image: jaegertracing/jaeger-query:1.18.0
    restart: always
    environment:
      - "SPAN_STORAGE_TYPE=elasticsearch"
      - "ES_SERVER_URLS=http://elasticsearch:9200"
    ports:
      - 16686:16686
    depends_on:
      - elasticsearch

  # Jaeger Agent
  agent:
    image: jaegertracing/jaeger-agent:1.18.0
    restart: always
    ports:
      - 6831:6831/udp
    command:
      - --reporter.grpc.host-port=collector:14250
  
  # Elastic Search
  elasticsearch:
    image: elasticsearch:7.5.2
    environment:
      - "node.name=es01"
      - "discovery.type=single-node"
      - "bootstrap.memory_lock=true"
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
  
  # Spark Dependencies
  diagram:
    image: jaegertracing/spark-dependencies:latest
    environment:
      - "STORAGE=elasticsearch"
      - "ES_NODES=http://elasticsearch:9200"
      - "JAVA_OPTS=-Xmx512m"

