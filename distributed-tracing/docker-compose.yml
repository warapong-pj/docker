version: '3'

services:
  collector:
    image: jaegertracing/jaeger-collector:1.18.0
    environment:
      - "SPAN_STORAGE_TYPE=elasticsearch"
      - "ES_SERVER_URLS=http://elasticsearch:9200"
    depends_on:
      - elasticsearch
  query:
    image: jaegertracing/jaeger-query:1.18.0
    environment:
      - "SPAN_STORAGE_TYPE=elasticsearch"
      - "ES_SERVER_URLS=http://elasticsearch:9200"
    ports:
      - 16686:16686
    depends_on:
      - elasticsearch
  agent:
    image: jaegertracing/jaeger-agent:1.18.0
    command:
      - --reporter.grpc.host-port=collector:14250
  elasticsearch:
    image: elasticsearch:7.5.2
    environment:
      - "node.name=es01"
      - "discovery.type=single-node"
      - "bootstrap.memory_lock=true"
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

  # sample application
  application:
    image: jaegertracing/example-hotrod
    environment:
      - "JAEGER_AGENT_HOST=agent"
      - "JAEGER_AGENT_PORT=6831"
    ports:
      - 8080:8080
    command:
      - all
